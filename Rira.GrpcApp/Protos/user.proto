syntax = "proto3";

option csharp_namespace = "Rira.GrpcApp";

import "google/protobuf/timestamp.proto";

service UserService {
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc GetUser (GetUserRequest) returns (UserResponse);
  rpc GetAllUsers (GetAllUsersRequest) returns (UserListResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser (DeleteUserRequest)  returns (DeleteUserResponse);
}

message CreateUserRequest {
  string first_name = 1;
  string last_name = 2;
  string national_code = 3;
  google.protobuf.Timestamp birth_date = 4;
}

message UpdateUserRequest {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string national_code = 4;
  google.protobuf.Timestamp birth_date = 5;
}

message GetUserRequest {
  string id = 1;
}

message GetAllUsersRequest {
  int32 pageNumber = 1;
  int32 pageSize = 2;
}

message DeleteUserRequest {
  string id = 1;
}

message UserResponse {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string national_code = 4;
  google.protobuf.Timestamp birth_date = 5;
}

message UserListResponse {
  repeated UserResponse Users = 1;
}

message DeleteUserResponse {
  bool success = 1;
}
